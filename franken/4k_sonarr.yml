# yaml-language-server: $schema=https://raw.githubusercontent.com/recyclarr/recyclarr/master/schemas/config-schema.json
sonarr:
  sonarr:
    base_url: !secret sonarr_url
    api_key: !secret sonarr_api_key

    delete_old_custom_formats: true

    quality_definition:
      type: series
      
    # Set up folder and file renaming to your media player standards
    media_naming:
      series: plex-tvdb # or jellyfin-tvdb
      season: default
      episodes:
        rename: true
        standard: default
        daily: default
        anime: default

    quality_profiles:
      - trash_id: 9d142234e45d6143785ac55f5a9e8dc9  # WEB-1080p (Alternative)
        reset_unmatched_scores:
          enabled: true
      - trash_id: dfa5eaae7894077ad6449169b6eb03e0  # WEB-2160p (Alternative)
        reset_unmatched_scores:
          enabled: true

    custom_format_groups:
      add:
        # Uncomment and customize per your advanced audio setup - Atmos, 5.1, etc.
        # Use 'select' to adjust: https://recyclarr.dev/guide/cf-groups/#pattern-select
        - trash_id: e9a1944a254e6f8a9da63083f7ae15cb  # [Audio] Audio Formats
          assign_scores_to:
            - trash_id: dfa5eaae7894077ad6449169b6eb03e0
        
        # Uncomment the IDs most fitting for your setup - DoVi or HDR10+.
        - trash_id: d776a1ea912a117d66d83b880ff2055d  # [HDR Formats] DV (w/o HDR fallback)
        - trash_id: e0b2774083df4265f25c9e5bc6c80940  # [HDR Formats] DV Boost
        - trash_id: 7d366c213e5c23a052b157356fac1921  # [HDR Formats] HDR10+ Boost
        
        - trash_id: f4a0410a1df109a66d6e47dcadcce014  # [Optional] Miscellaneous
          select:
            - 32b367365729d530ca1c124a0b180c64 # Bad dual groups
            - 82d40da2bc6923f41e14394075dd4b03 # No RlsGroup
            - e1a997ddb54e3ecbfe06341ad323c458 # Obfuscated
            - 06d66ab109d4d2eddb2794d21526d140 # Retags
            - 1b3994c551cbb92a2c781af061f4ab44 # Scene

        - trash_id: d920fd959d220306888f40b6f38e1578  # [Optional] Season Packs
