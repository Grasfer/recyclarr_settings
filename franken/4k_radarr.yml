radarr:
  radarr:
    base_url: !secret radarr_url
    api_key: !secret radarr_api_key

    delete_old_custom_formats: true

    media_naming:
      folder: plex-tmdb # or jellyfin-tmdb
      movie:
        rename: true
        standard: plex-tmdb # or jellyfin-tmdb

    quality_definition:
      type: movie

    quality_profiles:
      - trash_id: d1d67249d3890e49bc12e275d989a7e9  # HD Bluray + WEB
        reset_unmatched_scores:
          enabled: true
      - trash_id: 64fb5f9858489bdac2af690e27c8f42f  # UHD Bluray + WEB
        reset_unmatched_scores:
          enabled: true

    custom_format_groups:
      add:
        # Uncomment and customize per your advanced audio setup - Atmos, 5.1, etc.
        # Use 'select' to adjust: https://recyclarr.dev/guide/cf-groups/#pattern-select
        # - trash_id: 9d5acd8f1da78dfbae788182f7605200 # [Audio] Audio formats
        #   assign_scores_to:
        #     - trash_id: 64fb5f9858489bdac2af690e27c8f42f # UHD Bluray & WEB
        
        # Uncomment the IDs most fitting for your setup - DoVi or HDR10+.
        # - trash_id: 7fc2751eef7e6bdc70b74136e5e35c76  # [HDR Formats] DV (w/o HDR fallback)
        # - trash_id: 1616617ab3a14397a2b2321bcbda44d1  # [HDR Formats] DV Boost
        # - trash_id: b29413a7487478fe98228ce79e5689e4  # [HDR Formats] HDR10+ Boost
        
        - trash_id: f4f1474b963b24cf983455743aa9906c  # Movie Versions
          select:
            - 570bc9ebecd92723d2d21500f4be314c # Remaster
            - eca37840c13c6ef2dd0262b141a5482f # 4K source remaster
            - e0c07d59beb37348e975a930d5e50319 # Criterion
            - 9d27d9d2181838f76dee150882bdc58c # Masters of Cinema
            - db9b4c4b53d312a3ca5f1378f6440fc9 # Vinegar syndrom
            - eecf3a857724171f968a66cb5719e152 # IMAX
            - 9f6cbff8cfe4ebbc1bde14c7b7bec0de # IMAX Enhanced
        - trash_id: 9337080378236ce4c0b183e35790d2a7 # Miscellaneous exclusions
          select:
            - b6832f586342ef70d9c128d40c07b872 # Bad dual groups
            - cc444569854e9de0b084ab2b8b1532b2 # B&W editions
            - ae9b7c9ebde1f3bd336a8cbd1ec4c5e5 # No-RlsGroup
            - 7357cf5161efbf8c4d5d0c30b4815ee2 # Obfuscated
            - 5c44f52a8714fdd79bb4d98e2673be1f # Retags
            - f537cf427b64c38c8e36298f657e4828 # Scene
